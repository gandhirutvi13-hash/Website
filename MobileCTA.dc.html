<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/vendor/react.production.min.js"></script>
<script src="/vendor/react-dom.production.min.js"></script>
<script src="/support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;}</style>
</helmet>

<div id="pbrMobileCta" style="display:none;position:fixed;left:0;right:0;bottom:0;z-index:75;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(253,248,245,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(27,32,33,.09);box-shadow:0 -8px 30px rgba(14,79,82,.1);">
  <div style="display:flex;gap:9px;max-width:520px;margin:0 auto;">
    <a href="{{ waHref }}" target="_blank" rel="noopener" style="flex:1 1 auto;display:flex;align-items:center;justify-content:center;gap:9px;background:#25D366;color:#fff;text-decoration:none;font-family:'Inter',sans-serif;font-weight:700;font-size:15.5px;padding:15px;border-radius:100px;box-shadow:0 6px 18px rgba(37,211,102,.32);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38c1.45.79 3.08 1.21 4.79 1.21 5.46 0 9.91-4.45 9.91-9.91C21.95 6.45 17.5 2 12.04 2zm5.8 14.12c-.24.68-1.4 1.3-1.94 1.38-.5.07-1.13.1-1.82-.11-.42-.13-.96-.31-1.65-.61-2.9-1.25-4.79-4.17-4.94-4.37-.14-.19-1.18-1.57-1.18-2.99s.75-2.12 1.01-2.41c.26-.29.57-.36.76-.36.19 0 .38.002.55.01.18.008.41-.067.64.49.24.57.81 1.98.88 2.12.07.14.12.31.02.5-.09.19-.14.31-.28.48-.14.17-.29.37-.42.5-.14.14-.28.29-.12.57.16.28.71 1.17 1.53 1.9 1.05.94 1.94 1.23 2.22 1.37.28.14.44.12.6-.07.17-.19.69-.81.87-1.09.18-.28.36-.23.61-.14.25.09 1.58.75 1.85.88.28.14.46.21.53.33.07.12.07.68-.17 1.36z"/></svg>
      Chat on WhatsApp
    </a>
    <a href="{{ bookHref }}" target="_blank" rel="noopener" style="flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:6px;background:#EE7B5B;color:#1B2021;text-decoration:none;font-family:'Inter',sans-serif;font-weight:700;font-size:15.5px;padding:15px 22px;border-radius:100px;box-shadow:0 6px 18px rgba(238,123,91,.3);">Book</a>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  PHONE = "918879475065";
  NAMES = { 'back-neck':'back and neck pain','sports-injury':'a sports injury','post-surgery':'post-surgery rehab','knee-joint':'knee or joint pain','sciatica':'sciatica','posture':'posture correction','frozen-shoulder':'frozen shoulder','geriatric':'geriatric mobility' };

  context(){
    const path = decodeURIComponent(location.pathname || '').toLowerCase();
    const slug = (location.hash || '').replace('#','').trim();
    if (path.includes('condition') && slug && this.NAMES[slug]) return "I am reading about " + this.NAMES[slug];
    if (path.includes('conditions')) return "I am exploring the conditions page";
    if (path.includes('about')) return "I read about your approach";
    return "I found PhysioByRutvi online";
  }
  link(msg){ return "https://wa.me/" + this.PHONE + "?text=" + encodeURIComponent(msg); }
  wa = this.link("Hi Dr Rutvi, " + this.context() + ". My area is ___ and my concern is ___. I would like to ask about a home physiotherapy visit.");
  book = this.link("Hi Dr Rutvi, I'd like to book a home visit. My name is ___, suburb is ___, preferred day/time is ___, and I need help with ___. " + this.context() + ".");

  onResize = () => {
    const el = document.getElementById('pbrMobileCta');
    const hasVoiceWidget = Boolean(document.querySelector('elevenlabs-convai'));
    if (el) el.style.display = window.innerWidth < 900 && !hasVoiceWidget ? 'block' : 'none';
  };
  componentDidMount(){
    window.addEventListener('resize', this.onResize);
    this.onResize();
  }
  componentWillUnmount(){ window.removeEventListener('resize', this.onResize); }
  renderVals(){ return { waHref: this.wa, bookHref: this.book }; }
}
</script>
</body>
</html>
